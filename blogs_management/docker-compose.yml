services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: Blogs_Management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/Blogs_Management
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: "123456"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
      # folder upload trong container (tùy code bạn dùng path nào)
      UPLOAD_DIR: /app/uploads/blogImages
    ports:
      - "8081:8081"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
